type: object
description: Plugin category (compact, for list view)
properties:
  id:
    type: integer
    description: Category ID
    example: 1
  slug:
    type: string
    description: Category slug
    example: "monitoring"
  name:
    type: string
    description: Category name
    example: "Monitoring"
required:
  - id
  - slug
  - name
