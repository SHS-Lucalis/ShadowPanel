openapi: 3.1.0
info:
  title: GameAP API
  version: v4
  description: |
    GameAP v4 API for game server management.

    ## Authentication

    The API supports three authentication methods:

    ### Bearer Token (JWT/PASETO)
    Obtained from `POST /api/auth/login`. Valid for 24 hours (or 7 days with `remember_me`).
    Tokens can be revoked early via `POST /api/auth/logout`.
    ```
    Authorization: Bearer eyJhbG...
    ```

    ### Personal Access Token (PAT)
    Created via `POST /api/tokens`. Format: `{token_id}|{token_secret}`.
    PATs can have limited abilities (permissions).
    ```
    Authorization: Bearer 42|abc123...xyz
    ```

    ### Daemon Token
    For `/gdaemon_api/*` endpoints. Assigned to each node for daemon-to-API communication.
    ```
    X-Auth-Token: daemon-api-token-here
    ```

    ## Response Format

    ### Success Response
    ```json
    {
      "status": "ok"
    }
    ```

    ### Error Response
    ```json
    {
      "status": "error",
      "error": "Error message",
      "message": "Error message",
      "http_code": 422
    }
    ```

    ### Paginated Response
    ```json
    {
      "current_page": 1,
      "data": [...],
      "from": 1,
      "last_page": 5,
      "per_page": 15,
      "total": 75
    }
    ```

    ## WebSocket endpoints

    OpenAPI does not natively model WebSocket flows; this section documents
    them informally. All WS endpoints accept the same Bearer token via the
    `?token=` query parameter (the browser does not allow setting headers
    on a WebSocket upgrade). Outbound frames are JSON
    `{"type": string, "payload": any, "ts": int64}` envelopes.

    ### `/api/ws/nodes/metrics` (admin only)

    Live metrics for **all enabled nodes**, multiplexed over a single
    socket. No replay is sent. Each `metrics` envelope's
    `payload.common_labels.node_id` identifies the source node.

    Frames:
    - `metrics.replay.done` — emitted once at start, before live samples.
    - `metrics` — payload is `MetricsWireResponse`.
    - `metrics.error` — payload is `{ "error": string }`.

    ### `/api/ws/nodes/{id}/metrics` (admin only)

    Per-node stream with 30-minute replay history. Used by the node
    details modal for sparkline charts.

    Frames: `metrics.replay` (array of `MetricsWireResponse`),
    `metrics.replay.done`, `metrics`, `metrics.error`.

    ### `/api/ws/servers/{server}/metrics`

    Per-server stream filtered to envelopes carrying the matching
    `server_id` label, plus machine-level series. Same frame protocol as
    the per-node endpoint.

    ### `/api/ws/tasks/{id}`

    Live status stream for a single daemon task. Used by the task
    progress drawer in the panel UI. The server emits frames; the
    client only sends pings.

    Outbound frames (server → client):
    - `task.status` — payload describes the current task state. Fields
      include `task_id`, `status` (one of `waiting`, `working`,
      `success`, `error`, `canceled`), and optionally `server_id` /
      `progress`.
    - `task.output` — payload `{ task_id, chunk, is_final }`. Streamed
      as the task writes stdout/stderr.
    - `task.complete` — emitted once when the task reaches a terminal
      state. Payload `{ task_id, status }`. The server may close the
      socket immediately afterwards.

    ### `/api/ws/servers/{server}/console`

    Bidirectional console stream for a server. Replays the buffered
    console history on connect, then streams new lines.

    Inbound frames (client → server):
    - `console.command` — payload `{ command: string }`. Forwarded to
      the daemon to execute against the server's interactive shell.
      Requires the `console` ability on the server.

    Outbound frames (server → client):
    - `console.history` — sent once at connect time. Payload
      `{ output: string }` with the buffered console contents (may be
      empty).
    - `console.output` — payload `{ chunk: string }` (streamed).
    - `error` — payload `{ message: string }` for authorization, daemon
      connectivity, or RPC failures. The envelope's top-level `error`
      field carries the same message. The server may close the socket
      after sending an `error` frame.

    ### `/api/ws/servers/{server}/attach`

    Interactive PTY session for a server (raw shell attach). Used for
    server installation flows and operator debugging. Requires the
    `console` ability on the server (sending input also requires
    `console.send`).

    Inbound frames (client → server):
    - `attach.input` — payload `{ data: bytes }`. Bytes sent to the PTY.
    - `attach.detach` — empty payload. Detaches the client without
      killing the underlying process.

    Outbound frames (server → client):
    - `attach.started` — payload `{ session_id, server_id }`. Sent
      once after the daemon confirms attach.
    - `attach.output` — payload `{ data: bytes }`. PTY output, streamed.
    - `error` — same shape as the console endpoint.

    ### `MetricsWireResponse` shape

    ```json
    {
      "timestamp": "2026-04-27T15:30:45.123Z",
      "common_labels": { "node_id": "1" },
      "series": [
        {
          "name": "gameap_node_cpu_usage_percent",
          "type": "gauge",
          "unit": "percent",
          "labels": {},
          "points": [{
            "timestamp": "2026-04-27T15:30:45.123Z",
            "value": "47.2"
          }]
        },
        {
          "name": "gameap_node_network_receive_bytes_total",
          "type": "counter",
          "unit": "bytes",
          "labels": { "interface": "eth0" },
          "points": [{
            "timestamp": "2026-04-27T15:30:45.123Z",
            "value": "1623771160"
          }]
        },
        {
          "name": "gameap_node_disk_usage_percent",
          "type": "gauge",
          "unit": "percent",
          "labels": { "mount": "/" },
          "points": [{
            "timestamp": "2026-04-27T15:30:45.123Z",
            "value": "6.13"
          }]
        }
      ],
      "actual_window_seconds": 0
    }
    ```

    Series with the same `name` may repeat with different `labels` (e.g.
    one `gameap_node_network_receive_bytes_total` per interface,
    one `gameap_node_disk_usage_percent` per mount). Currently emitted
    metric names include:
    `gameap_node_cpu_usage_percent`,
    `gameap_node_memory_usage_percent`,
    `gameap_node_memory_usage_bytes`,
    `gameap_node_memory_total_bytes`,
    `gameap_node_swap_usage_bytes`,
    `gameap_node_swap_total_bytes`,
    `gameap_node_disk_usage_percent` (label `mount`),
    `gameap_node_disk_usage_bytes` (label `mount`),
    `gameap_node_disk_total_bytes` (label `mount`),
    `gameap_node_network_receive_bytes_total` (label `interface`),
    `gameap_node_network_transmit_bytes_total` (label `interface`),
    `gameap_node_load1`, `gameap_node_load5`, `gameap_node_load15`,
    `gameap_node_uptime_seconds_total`.

    See `schemas/responses/MetricsWireResponse.yaml` for the JSON schema.
