/api/nodes/{node}/busy_ports:
  get:
    tags:
      - Nodes
    summary: Get busy ports
    description: |
      Returns ports in use on a node, grouped by IP (Admin only).
      The keys are IP strings; the values are arrays of integer ports.
    operationId: getNodeBusyPorts
    parameters:
      - name: node
        in: path
        required: true
        description: Node ID
        schema:
          type: integer
    responses:
      '200':
        description: Busy ports keyed by IP
        content:
          application/json:
            schema:
              type: object
              description: Map of IP address → list of ports in use on that IP
              additionalProperties:
                type: array
                items:
                  type: integer
              example:
                "0.0.0.0": [27015, 27016]
                "192.168.1.10": [25565]
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

