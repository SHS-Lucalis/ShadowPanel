type: object
description: |
  User payload returned by `POST /api/users` and `PUT /api/users/{id}`.
  Extends the `User` entity with the user's role names.
properties:
  id:
    type: integer
    description: User ID
    example: 1
  login:
    type: string
    description: Username
    maxLength: 255
    example: "admin"
  email:
    type: string
    format: email
    description: Email address
    maxLength: 255
    example: "admin@example.com"
  name:
    type:
      - string
      - "null"
    description: Display name
    maxLength: 255
    example: "Administrator"
  created_at:
    type:
      - string
      - "null"
    format: date-time
  updated_at:
    type:
      - string
      - "null"
    format: date-time
  roles:
    type: array
    description: Role names assigned to the user
    items:
      type: string
    example: ["admin"]
required:
  - id
  - login
  - email
  - roles
