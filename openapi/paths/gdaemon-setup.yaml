/gdaemon/setup/{token}:
  get:
    tags:
      - DaemonSetup
    summary: Get daemon setup script (legacy)
    description: |
      Legacy endpoint. Returns bash script for daemon installation.
      Used when gRPC is disabled (GRPC_ENABLED=false).
      For gRPC-enabled setups, use /nodes/setup/{key} instead.
    operationId: getDaemonSetup
    security: []
    parameters:
      - $ref: '../parameters/PathToken.yaml'
      - name: config
        in: query
        required: false
        description: |
          Optional configuration string to pass to the install script.
          Will be base64-encoded in the output script.
          Example: process_manager.name=podman;process_manager.config.image=debian:bookworm-slim
        schema:
          type: string
    responses:
      '200':
        description: Bash script for daemon installation
        content:
          text/plain:
            schema:
              type: string
              example: |
                export CREATE_TOKEN=abc123;
                export PANEL_HOST=http://panel.example.com;
                curl -sL https://raw.githubusercontent.com/gameap/auto-install-scripts/master/install-gdaemon.sh | bash --
      '401':
        description: Invalid token
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

/nodes/setup/{key}:
  get:
    tags:
      - DaemonSetup
    summary: Get enrollment setup script
    description: |
      Returns bash script that downloads gameapctl and runs enrollment via gRPC.
      Requires gRPC to be enabled (GRPC_ENABLED=true).
      The key is a setup key obtained from GET /api/nodes/setup.
    operationId: getEnrollmentSetup
    security: []
    parameters:
      - name: key
        in: path
        required: true
        description: Setup key (32-character string)
        schema:
          type: string
      - name: config
        in: query
        required: false
        description: |
          Optional configuration string passed to gameapctl.
          Example: process_manager.name=systemd
        schema:
          type: string
    responses:
      '200':
        description: Bash script that downloads and runs gameapctl with enrollment
        content:
          text/plain:
            schema:
              type: string
              example: |
                #!/bin/bash
                set -e
                CONNECT_URL="grpc://panel.example.com:31718/AbCdEfGh1234567890AbCdEfGh123456"
                # ... downloads gameapctl and runs enrollment
      '403':
        description: Invalid or expired setup key
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '503':
        description: gRPC is disabled
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

/gdaemon/create/{token}:
  post:
    tags:
      - DaemonSetup
    summary: Create daemon node
    description: Creates a new daemon node from setup token
    operationId: createDaemonNode
    security: []
    parameters:
      - $ref: '../parameters/PathToken.yaml'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                description: Node name
              os:
                type: string
                description: Operating system
              work_path:
                type: string
                description: Working directory
              gdaemon_host:
                type: string
                description: GDaemon hostname
              gdaemon_port:
                type: integer
                description: GDaemon port
              ip:
                type: array
                description: IP addresses
                items:
                  type: string
            required:
              - name
              - os
              - work_path
              - gdaemon_host
              - gdaemon_port
    responses:
      '200':
        description: Node created
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: Node ID
                api_token:
                  type: string
                  description: API token for daemon
      '401':
        description: Invalid token
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '422':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
