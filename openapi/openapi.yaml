components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT or PASETO token obtained from /api/auth/login

    personalAccessToken:
      type: http
      scheme: bearer
      description: Personal Access Token in format {id}|{token}

    daemonToken:
      type: apiKey
      in: header
      name: X-Auth-Token
      description: Daemon authentication token for /gdaemon_api/* endpoints

  schemas:
    $ref: './schemas/_index.yaml'

  parameters:
    $ref: './parameters/_index.yaml'

security:
  - bearerAuth: []
  - personalAccessToken: []

