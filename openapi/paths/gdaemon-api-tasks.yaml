/gdaemon_api/tasks:
  get:
    tags:
      - DaemonAPI
    summary: Get daemon tasks
    description: Returns pending tasks for the daemon
    operationId: getDaemonTasks
    security:
      - daemonToken: []
    responses:
      '200':
        description: List of tasks
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/DaemonTask.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

/gdaemon_api/tasks/{gdaemon_task}:
  put:
    tags:
      - DaemonAPI
    summary: Update daemon task
    description: Updates daemon task status
    operationId: updateDaemonTask
    security:
      - daemonToken: []
    parameters:
      - name: gdaemon_task
        in: path
        required: true
        description: Daemon task ID
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                $ref: '../schemas/common/DaemonTaskStatus.yaml'
    responses:
      '200':
        description: Task updated
        content:
          application/json:
            schema:
              $ref: '../schemas/SuccessResponse.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '404':
        description: Task not found
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

/gdaemon_api/tasks/{gdaemon_task}/output:
  put:
    tags:
      - DaemonAPI
    summary: Update daemon task output
    description: Appends output to daemon task
    operationId: updateDaemonTaskOutput
    security:
      - daemonToken: []
    parameters:
      - name: gdaemon_task
        in: path
        required: true
        description: Daemon task ID
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              output:
                type: string
                description: Task output to append
            required:
              - output
    responses:
      '200':
        description: Output updated
        content:
          application/json:
            schema:
              $ref: '../schemas/SuccessResponse.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '404':
        description: Task not found
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
