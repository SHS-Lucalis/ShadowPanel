      - name: server
        in: path
        required: true
        description: Server ID
        schema:
          type: integer
      - name: path
        in: query
        required: true
        description: File path
        schema:
          type: string
    responses:
      '200':
        description: File stream
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      '401':
