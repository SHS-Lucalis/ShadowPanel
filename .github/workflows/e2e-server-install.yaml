name: E2E Server Install

on:
  schedule:
    # 03:00 UTC daily — nightly heavy E2E. Runs only when there are new commits
    # in the last 24h (see the `check` gate job). 03:00 UTC matches security-fuzz.
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: e2e-server-install
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Decide whether to run
        id: decide
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual dispatch — always run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$(git log --since='24 hours ago' --format=%H)" ]; then
            echo "Commits in the last 24h — running nightly E2E."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "No commits in the last 24h — skipping nightly E2E."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  e2e-server-install:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    # The 60-min ceiling is raised for the large/slow steamcmd (app 90) install.
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: gameap
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_DRIVER: postgres
      DATABASE_URL: 'postgres://postgres:testpassword@127.0.0.1:5432/gameap?sslmode=disable'
      AUTH_SECRET: e2e-test-secret-do-not-use-in-prod-32b
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: '8025'
      FILES_LOCAL_BASE_PATH: /tmp/gameap-files
      ADMIN_LOGIN: admin
      ADMIN_EMAIL: admin@localhost
      ADMIN_PASSWORD: e2e-admin-password
      GRPC_ENABLED: 'true'
      GRPC_PORT: '31718'
      GRPC_TLS_ENABLED: 'true'
      GRPC_EXTERNAL_HOST: host.docker.internal
      GRPC_EXTERNAL_PORT: '31718'
      DAEMON_SETUP_KEY: e2e-fixed-setup-key-do-not-use-in-prod
      E2E_ADMIN_USER: admin
      E2E_ADMIN_PASSWORD: e2e-admin-password
      E2E_API_BASE_URL: http://127.0.0.1:8025
      E2E_DAEMON_CONTAINER: gameap-daemon

    steps:
      - name: Checkout gameap-api
        uses: actions/checkout@v5

      - name: Checkout gameap/daemon
        uses: actions/checkout@v5
        with:
          repository: gameap/daemon
          path: daemon-src

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json

      - name: Download Go modules
        run: go mod download

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U postgres; do
            echo 'waiting for postgres...'
            sleep 2
          done

      - name: Build gameap-api
        run: go build -o /tmp/gameap ./cmd/gameap

      - name: Build gameap-daemon
        working-directory: daemon-src
        run: |
          go mod download
          CGO_ENABLED=0 go build -o /tmp/gameap-daemon ./cmd/gameap-daemon

      - name: Prepare file storage
        run: mkdir -p /tmp/gameap-files

      - name: Start gameap-api
        run: |
          /tmp/gameap > /tmp/gameap.log 2>&1 &
          echo $! > /tmp/gameap.pid
          for i in {1..90}; do
            if curl -sf http://127.0.0.1:8025/api/health > /dev/null 2>&1; then
              echo "API ready"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start"
          cat /tmp/gameap.log
          exit 1

      - name: Start daemon container
        run: |
          docker run -d --name gameap-daemon \
            --add-host=host.docker.internal:host-gateway \
            -p 31717:31717 \
            ubuntu:24.04 \
            bash -c "apt-get update -qq && \
                     apt-get install -y -qq ca-certificates curl tar && \
                     mkdir -p /etc/gameap-daemon/certs /var/gameap/work && \
                     sleep infinity"
          for i in {1..60}; do
            if docker exec gameap-daemon ls /etc/gameap-daemon/certs >/dev/null 2>&1; then
              echo "container ready"
              break
            fi
            sleep 1
          done
          docker cp /tmp/gameap-daemon gameap-daemon:/usr/local/bin/gameap-daemon
          docker exec gameap-daemon chmod +x /usr/local/bin/gameap-daemon

      - name: Enroll daemon
        run: |
          docker exec gameap-daemon /usr/local/bin/gameap-daemon enroll \
            --connect "grpc://host.docker.internal:31718/${DAEMON_SETUP_KEY}" \
            --config-path /etc/gameap-daemon/gameap-daemon.yaml \
            --certs-dir /etc/gameap-daemon/certs \
            --work-path /var/gameap/work \
            --listen-ip 127.0.0.1 \
            --listen-port 31717
          docker exec -d gameap-daemon \
            /usr/local/bin/gameap-daemon --config=/etc/gameap-daemon/gameap-daemon.yaml

      - name: Wait for daemon to register
        run: |
          for i in {1..60}; do
            if grep -q "daemon connected" /tmp/gameap.log; then
              echo "daemon registered"
              exit 0
            fi
            sleep 1
          done
          echo "daemon did not register in time"
          cat /tmp/gameap.log
          docker logs gameap-daemon
          exit 1

      - name: Install frontend deps
        working-directory: web/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: web/frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright heavy tests (Quake 2)
        working-directory: web/frontend
        run: npx playwright test --project=heavy

      # steamcmd is a 32-bit binary and needs i386 libraries that the bare
      # ubuntu:24.04 daemon container does not ship.
      - name: Install steamcmd prerequisites in daemon
        run: |
          docker exec gameap-daemon bash -c "\
            dpkg --add-architecture i386 && \
            apt-get update -qq && \
            apt-get install -y -qq lib32gcc-s1 lib32stdc++6 ca-certificates curl tar xz-utils && \
            mkdir -p /srv/gameap/steamcmd && \
            curl -sqL https://steamcdn-a.akamaihd.net/client/installer/steamcmd_linux.tar.gz \
              | tar -xz -C /srv/gameap/steamcmd"

      - name: Run Playwright steamcmd heavy tests
        working-directory: web/frontend
        run: npx playwright test --project=heavy-steam

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/gameap.pid ]; then
            kill "$(cat /tmp/gameap.pid)" || true
          fi

      - name: Daemon container logs
        if: always()
        run: docker logs gameap-daemon > /tmp/gameap-daemon.log 2>&1 || true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: web/frontend/playwright-report/
          retention-days: 14

      - name: Upload server logs
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: server-logs
          path: |
            /tmp/gameap.log
            /tmp/gameap-daemon.log
          retention-days: 7
