/api/games:
  get:
    tags:
      - Games
    summary: List games
    description: Returns a list of games (Admin only)
    operationId: listGames
    responses:
      '200':
        description: List of games
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/Game.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

  post:
    tags:
      - Games
    summary: Create game
    description: Creates a new game (Admin only)
    operationId: createGame
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/requests/CreateGameRequest.yaml'
    responses:
      '200':
        description: Game created
        content:
          application/json:
            schema:
              $ref: '../schemas/Game.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '422':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

/api/games/upgrade:
  post:
    tags:
      - Games
    summary: Upgrade games database
    description: Upgrades games database from remote repository (Admin only)
    operationId: upgradeGames
    responses:
      '200':
        description: Games upgraded
        content:
          application/json:
            schema:
              $ref: '../schemas/SuccessResponse.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

/api/games/import/pelican-egg:
  post:
    tags:
      - Games
    summary: Import Pelican egg
    description: |
      Imports a Pelican/Pterodactyl egg configuration file and creates a Game and GameMod entry.

      The egg file (JSON or YAML) should be sent as the request body. The format is auto-detected
      based on content: JSON starts with `{`, otherwise YAML is assumed.

      The importer will:
      - Create a new Game with a generated code based on the egg name
      - Create a "Default" GameMod with startup command and variables
      - Store full Pelican egg data in metadata for future compatibility

      **Supported formats**:
      - JSON: Legacy Pterodactyl format (PTDL_v2) and Pelican format (PLCN_v3)
      - YAML: Pelican PLCN_v3 format

      **Note**: Installation scripts and Docker configuration from the egg are stored in metadata
      but not currently executed by GameAP Daemon.
    operationId: importPelicanEgg
    parameters:
      - $ref: '../parameters/QueryGameName.yaml'
      - $ref: '../parameters/QueryGameCode.yaml'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/requests/ImportPelicanEggRequest.yaml'
        application/x-yaml:
          schema:
            type: string
            format: binary
        text/yaml:
          schema:
            type: string
            format: binary
    responses:
      '200':
        description: Egg imported successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/responses/ImportPelicanEggResponse.yaml'
      '400':
        description: Invalid egg format
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

/api/games/import/gameap:
  post:
    tags:
      - Games
    summary: Import GameAP YAML
    description: |
      Imports a GameAP YAML configuration file and creates or updates a Game and its mods.

      The YAML file should be sent as the request body and must contain:
      - schema_version: "1.0"
      - game: object with code, name, and engine fields
      - mods: optional array of game modifications

      **Upsert behavior**:
      - If a game with the same code exists, it will be updated
      - If a mod with the same name exists for the game, it will be updated
      - Existing mods that are not in the import file are preserved

      **Validation**:
      - Maximum body size: 1 MB
      - game.code: 2-16 characters, pattern: ^[a-z0-9_-]+$
      - Duplicate mod names in the same file are not allowed
    operationId: importGameAP
    parameters:
      - $ref: '../parameters/QueryGameName.yaml'
      - $ref: '../parameters/QueryGameCode.yaml'
    requestBody:
      required: true
      content:
        application/x-yaml:
          schema:
            type: string
            format: binary
        text/yaml:
          schema:
            type: string
            format: binary
    responses:
      '200':
        description: GameAP config imported successfully
        content:
          application/json:
            schema:
              $ref: '../schemas/responses/ImportGameAPResponse.yaml'
      '400':
        description: Invalid YAML format or validation error
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

