name: Mutation Test

# Информационный workflow: оценка качества unit-тестов через мутационное тестирование.
# Запускается еженедельно и вручную; не блокирует pipeline (continue-on-error на всех шагах).

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Go packages glob (default: pure-logic packages)'
        required: false
        default: './internal/filters/... ./internal/rbac/... ./internal/domain/... ./pkg/auth/... ./pkg/api/...'
        type: string
  schedule:
    # 04:00 UTC every Sunday
    - cron: '0 4 * * 0'
  push:
    branches: [main, develop]
    paths:
      - 'internal/filters/**'
      - 'internal/rbac/**'
      - 'internal/domain/**'
      - 'pkg/auth/**'
      - 'pkg/api/**'
      - '.github/workflows/mutation-test.yaml'
      - '.gremlins.yaml'
      - '.go-mutesting.yaml'

permissions:
  contents: read

concurrency:
  group: mutation-test-${{ github.ref }}
  cancel-in-progress: true

env:
  DEFAULT_PACKAGES: './internal/filters/... ./internal/rbac/... ./internal/domain/... ./pkg/auth/... ./pkg/api/...'

jobs:
  gremlins:
    name: gremlins
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x

      - name: Restore Go module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: gocache-mut-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: gocache-mut-${{ runner.os }}-

      - name: Download dependencies
        run: go mod download

      - name: Install gremlins
        run: go install github.com/go-gremlins/gremlins/v2/cmd/gremlins@latest

      - name: Run gremlins
        continue-on-error: true
        env:
          PACKAGES: ${{ github.event.inputs.packages || env.DEFAULT_PACKAGES }}
        run: |
          set +e
          # shellcheck disable=SC2086
          # PACKAGES intentionally unquoted: it's a space-separated list of
          # Go package globs that must split into multiple arguments.
          gremlins unleash \
            --threshold-efficacy=0 \
            --threshold-mcover=0 \
            --output=gremlins-report.json \
            --workers=4 \
            $PACKAGES
          exit 0

      - name: Upload gremlins report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gremlins-report
          path: gremlins-report.json
          if-no-files-found: warn
          retention-days: 30

      - name: Print gremlins summary
        if: always()
        run: |
          if [ -f gremlins-report.json ]; then
            echo "=== Gremlins Mutation Score ==="
            jq -r '
              "Killed:      \(.killed // 0)",
              "Lived:       \(.lived // 0)",
              "Not Covered: \(.notCovered // 0)",
              "Timed out:   \(.timedOut // 0)",
              "Not viable:  \(.notViable // 0)",
              "Efficacy:    \(((.efficacy // 0) * 100) | floor)%",
              "M-cover:     \(((.mutantsCoverage // 0) * 100) | floor)%"
            ' gremlins-report.json || cat gremlins-report.json
          else
            echo "gremlins-report.json not produced"
          fi

  go-mutesting:
    name: go-mutesting
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x

      - name: Restore Go module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: gocache-mut-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: gocache-mut-${{ runner.os }}-

      - name: Download dependencies
        run: go mod download

      - name: Install go-mutesting
        run: go install -v github.com/avito-tech/go-mutesting/...@latest

      - name: Run go-mutesting
        continue-on-error: true
        env:
          PACKAGES: ${{ github.event.inputs.packages || env.DEFAULT_PACKAGES }}
        run: |
          set +e
          mkdir -p mutation-reports
          # shellcheck disable=SC2086
          # PACKAGES intentionally unquoted: see gremlins job.
          go-mutesting \
            --config=.go-mutesting.yaml \
            $PACKAGES 2>&1 | tee mutation-reports/go-mutesting.log
          if [ -f report.json ]; then
            cp report.json mutation-reports/go-mutesting-report.json
          fi
          exit 0

      - name: Upload go-mutesting report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-mutesting-report
          path: mutation-reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Print go-mutesting summary
        if: always()
        run: |
          REPORT="mutation-reports/go-mutesting-report.json"
          if [ -f "$REPORT" ]; then
            echo "=== go-mutesting Score ==="
            jq -r '
              "Total:  \(.stats.total // 0)",
              "Killed: \(.stats.killed // 0)",
              "Alive:  \(.stats.alive // 0)",
              "Score:  \(.stats.score // 0)"
            ' "$REPORT" || cat "$REPORT"
          else
            echo "go-mutesting report.json not produced"
          fi
