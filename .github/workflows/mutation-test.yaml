name: Mutation Test

# Информационный workflow: оценка качества unit-тестов через мутационное тестирование.
# Запускается еженедельно и вручную; не блокирует pipeline (continue-on-error на всех шагах).

on:
  workflow_dispatch:
    inputs:
      packages:
        description: 'Go packages glob (default: pure-logic packages)'
        required: false
        default: './internal/filters/... ./internal/rbac/... ./internal/domain/... ./pkg/auth/... ./pkg/api/...'
        type: string
  schedule:
    # 04:00 UTC every Sunday
    - cron: '0 4 * * 0'
  push:
    branches: [main, develop]
    paths:
      - 'internal/filters/**'
      - 'internal/rbac/**'
      - 'internal/domain/**'
      - 'pkg/auth/**'
      - 'pkg/api/**'
      - '.github/workflows/mutation-test.yaml'
      - '.gremlins.yaml'
      - '.go-mutesting.yaml'

permissions:
  contents: read

concurrency:
  group: mutation-test-${{ github.ref }}
  cancel-in-progress: true

env:
  DEFAULT_PACKAGES: './internal/filters/... ./internal/rbac/... ./internal/domain/... ./pkg/auth/... ./pkg/api/...'

jobs:
  gremlins:
    name: gremlins
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x

      - name: Restore Go module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: gocache-mut-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: gocache-mut-${{ runner.os }}-

      - name: Download dependencies
        run: go mod download

      - name: Install gremlins
        # gremlins is still on 0.x — pin a known-good tag to avoid surprise breakage.
        run: go install github.com/go-gremlins/gremlins/cmd/gremlins@v0.6.0

      - name: Run gremlins
        continue-on-error: true
        env:
          PACKAGES: ${{ github.event.inputs.packages || env.DEFAULT_PACKAGES }}
        run: |
          set +e
          mkdir -p gremlins-reports
          # gremlins unleash takes a single path argument, so we loop over
          # the space-separated PACKAGES list and write one report per pkg.
          for pkg in $PACKAGES; do
            safe=$(echo "$pkg" | tr '/.' '__')
            echo "::group::gremlins $pkg"
            gremlins unleash \
              --threshold-efficacy=0 \
              --threshold-mcover=0 \
              --output="gremlins-reports/gremlins-${safe}.json" \
              --workers=4 \
              "$pkg"
            echo "::endgroup::"
          done
          exit 0

      - name: Upload gremlins reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gremlins-reports
          path: gremlins-reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Print gremlins summary
        if: always()
        run: |
          shopt -s nullglob
          reports=(gremlins-reports/*.json)
          if [ ${#reports[@]} -eq 0 ]; then
            echo "No gremlins reports produced"
            exit 0
          fi
          # gremlins JSON layout: {go_module, files: [{file_name, mutations: [{type, status, ...}]}]}
          # No aggregated counters — derive from mutations[].status.
          summarize() {
            local label=$1; shift
            echo "--- $label ---"
            jq -r '.files[]?.mutations[]?.status // empty' "$@" \
              | sort | uniq -c \
              | awk '{count=$1; $1=""; printf "  %-12s %d\n", substr($0,2), count}'
          }
          echo "=== Gremlins Mutation Score (per package) ==="
          for r in "${reports[@]}"; do
            summarize "$(basename "$r")" "$r"
          done
          echo "=== Gremlins Mutation Score (totals) ==="
          summarize "all" "${reports[@]}"

  go-mutesting:
    name: go-mutesting
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.x

      - name: Restore Go module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: gocache-mut-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: gocache-mut-${{ runner.os }}-

      - name: Download dependencies
        run: go mod download

      - name: Install go-mutesting
        run: go install -v github.com/avito-tech/go-mutesting/...@latest

      - name: Run go-mutesting
        continue-on-error: true
        env:
          PACKAGES: ${{ github.event.inputs.packages || env.DEFAULT_PACKAGES }}
        run: |
          set +e
          mkdir -p mutation-reports
          # Loop per package — go-mutesting writes report.json into cwd, so
          # we move it after each run to keep all reports.
          for pkg in $PACKAGES; do
            safe=$(echo "$pkg" | tr '/.' '__')
            echo "::group::go-mutesting $pkg"
            rm -f report.json
            go-mutesting \
              --config=.go-mutesting.yaml \
              "$pkg" 2>&1 | tee "mutation-reports/go-mutesting-${safe}.log"
            if [ -f report.json ]; then
              mv report.json "mutation-reports/go-mutesting-${safe}.json"
            fi
            echo "::endgroup::"
          done
          exit 0

      - name: Upload go-mutesting reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-mutesting-reports
          path: mutation-reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Print go-mutesting summary
        if: always()
        run: |
          shopt -s nullglob
          reports=(mutation-reports/go-mutesting-*.json)
          if [ ${#reports[@]} -eq 0 ]; then
            echo "No go-mutesting reports produced; см. mutation-reports/*.log"
            exit 0
          fi
          echo "=== go-mutesting Score (per package) ==="
          for r in "${reports[@]}"; do
            echo "--- $(basename "$r") ---"
            jq -r '
              .stats |
              "  Total:        \(.totalMutantsCount // 0)",
              "  Killed:       \(.killedCount // 0)",
              "  Escaped:      \(.escapedCount // 0)",
              "  Not covered:  \(.notCoveredCount // 0)",
              "  Timed out:    \(.timeOutCount // 0)",
              "  Errored:      \(.errorCount // 0)",
              "  Skipped:      \(.skippedCount // 0)",
              "  MSI:          \(((.msi // 0) * 100) | floor)%"
            ' "$r" 2>/dev/null || cat "$r"
          done
