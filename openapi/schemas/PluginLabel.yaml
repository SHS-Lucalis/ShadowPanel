type: object
description: Plugin store label
properties:
  id:
    type: integer
    description: Label ID
    example: 1
  slug:
    type: string
    description: Label slug
    example: "official"
  name:
    type: string
    description: Label name
    example: "Official"
  color:
    type: string
    description: Label color (hex)
    example: "#4CAF50"
required:
  - id
  - slug
  - name
  - color
