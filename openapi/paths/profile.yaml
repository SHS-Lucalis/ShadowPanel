/api/profile:
  get:
    tags:
      - Profile
    summary: Get user profile
    description: Returns the current user's profile with roles and permissions
    operationId: getProfile
    responses:
      '200':
        description: User profile
        content:
          application/json:
            schema:
              $ref: '../schemas/Profile.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

  put:
    tags:
      - Profile
    summary: Update user profile
    description: Updates the current user's profile
    operationId: updateProfile
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/requests/UpdateProfileRequest.yaml'
    responses:
      '200':
        description: Profile updated
        content:
          application/json:
            schema:
              type: object
              description: Profile update acknowledgement
              properties:
                message:
                  type: string
                  example: "Profile updated successfully"
              required:
                - message
      '400':
        description: Validation error or wrong current password
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
