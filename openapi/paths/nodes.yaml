/api/nodes:
  get:
    tags:
      - Nodes
    summary: List nodes
    description: Returns a paginated list of nodes (Admin only)
    operationId: listNodes
    parameters:
      - $ref: '../parameters/QueryPage.yaml'
      - $ref: '../parameters/QueryPerPage.yaml'
      - $ref: '../parameters/QuerySort.yaml'
    responses:
      '200':
        description: List of nodes
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../schemas/PaginatedResponse.yaml'
                - type: object
                  properties:
                    data:
                      type: array
                      items:
                        $ref: '../schemas/Node.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

/api/dedicated_servers:
