type: object
description: Plugin category (detailed, for plugin details view)
properties:
  id:
    type: integer
    description: Category ID
    example: 1
  slug:
    type: string
    description: Category slug
    example: "monitoring"
  name:
    type: string
    description: Category name
    example: "Monitoring"
  description:
    type: string
    description: Category description
    example: "Monitoring and analytics plugins"
  icon:
    type: string
    description: Category icon
    example: "monitor"
required:
  - id
  - slug
  - name
  - description
  - icon
