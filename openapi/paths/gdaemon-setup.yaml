/gdaemon/setup/{token}:
  get:
    tags:
      - DaemonSetup
    summary: Get daemon setup script
    description: Returns bash script for daemon installation with environment variables
    operationId: getDaemonSetup
    security: []
    parameters:
      - $ref: '../parameters/PathToken.yaml'
      - name: config
        in: query
        required: false
        description: |
          Optional configuration string to pass to the install script.
          Will be base64-encoded in the output script.
          Example: process_manager.name=podman;process_manager.config.image=debian:bookworm-slim
        schema:
          type: string
    responses:
      '200':
        description: Bash script for daemon installation
        content:
          text/plain:
            schema:
              type: string
              example: |
                export CREATE_TOKEN=abc123;
                export PANEL_HOST=http://panel.example.com;
                export CONFIG=cHJvY2Vzc19tYW5hZ2VyLm5hbWU9cG9kbWFu;
                curl -sL https://raw.githubusercontent.com/gameap/auto-install-scripts/master/install-gdaemon.sh | bash --
      '401':
        description: Invalid token
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

/gdaemon/create/{token}:
  post:
    tags:
      - DaemonSetup
    summary: Create daemon node
    description: Creates a new daemon node from setup token
    operationId: createDaemonNode
    security: []
    parameters:
      - $ref: '../parameters/PathToken.yaml'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              name:
                type: string
                description: Node name
              os:
                type: string
                description: Operating system
              work_path:
                type: string
                description: Working directory
              gdaemon_host:
                type: string
                description: GDaemon hostname
              gdaemon_port:
                type: integer
                description: GDaemon port
              ip:
                type: array
                description: IP addresses
                items:
                  type: string
            required:
              - name
              - os
              - work_path
              - gdaemon_host
              - gdaemon_port
    responses:
      '200':
        description: Node created
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: Node ID
                api_token:
                  type: string
                  description: API token for daemon
      '401':
        description: Invalid token
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '422':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
