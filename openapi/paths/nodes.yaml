/api/nodes/{id}:
  get:
    tags:
      - Nodes
    summary: Get node
    description: Returns a single node by ID (Admin only)
    operationId: getNode
    parameters:
      - $ref: '../parameters/PathNodeId.yaml'
    responses:
      '200':
        description: Node details
        content:
          application/json:
            schema:
              $ref: '../schemas/Node.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '404':
        description: Node not found
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

  put:
    tags:
      - Nodes
    summary: Update node
    description: Updates a node (Admin only)
    operationId: updateNode
    parameters:
      - $ref: '../parameters/PathNodeId.yaml'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/requests/UpdateNodeRequest.yaml'
    responses:
      '200':
        description: Node updated
        content:
          application/json:
            schema:
              $ref: '../schemas/Node.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '404':
        description: Node not found
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '422':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

  delete:
    tags:
      - Nodes
    summary: Delete node
    description: Deletes a node (Admin only)
    operationId: deleteNode
    parameters:
      - $ref: '../parameters/PathNodeId.yaml'
    responses:
      '204':
        description: Node deleted (no content)
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '404':
        description: Node not found
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

