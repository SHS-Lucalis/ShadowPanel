/api/file-manager/{server}/paste:
  post:
    tags:
      - FileManager
    summary: Copy/move files
    description: Copies or moves files/directories
    operationId: pasteFiles
    parameters:
      - name: server
        in: path
        required: true
        description: Server ID
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              items:
                type: array
                description: Source paths
                items:
                  type: string
              destination:
                type: string
                description: Destination directory
              operation:
                type: string
                enum: [copy, move]
                description: Operation type
            required:
              - items
              - destination
              - operation
    responses:
      '200':
        description: Operation completed
        content:
          application/json:
            schema:
              $ref: '../schemas/SuccessResponse.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
