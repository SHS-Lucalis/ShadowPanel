/gdaemon_api/servers:
  get:
    tags:
      - DaemonAPI
    summary: Get servers for daemon
    description: Returns servers assigned to the daemon's node
    operationId: getDaemonServers
    security:
      - daemonToken: []
    responses:
      '200':
        description: List of servers
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/Server.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

  patch:
    tags:
      - DaemonAPI
    summary: Batch update servers
    description: Updates multiple servers at once
    operationId: batchUpdateDaemonServers
    security:
      - daemonToken: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: array
            items:
              type: object
              properties:
                id:
                  type: integer
                  description: Server ID
                process_active:
                  type: boolean
                  description: Process active state
                installed:
                  type: integer
                  description: Installation status
              required:
                - id
    responses:
      '200':
        description: Servers updated
        content:
          application/json:
            schema:
              $ref: '../schemas/SuccessResponse.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

/gdaemon_api/servers/{server}:
  get:
    tags:
      - DaemonAPI
    summary: Get server for daemon
    description: Returns server details for daemon
    operationId: getDaemonServer
    security:
      - daemonToken: []
    parameters:
      - name: server
        in: path
        required: true
        description: Server ID
        schema:
          type: integer
    responses:
      '200':
        description: Server details
        content:
          application/json:
            schema:
              $ref: '../schemas/Server.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '404':
        description: Server not found
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

  put:
    tags:
      - DaemonAPI
    summary: Update server from daemon
    description: Updates server status from daemon
    operationId: updateDaemonServer
    security:
      - daemonToken: []
    parameters:
      - name: server
        in: path
        required: true
        description: Server ID
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              process_active:
                type: boolean
                description: Process active state
              installed:
                type: integer
                description: Installation status
    responses:
      '200':
        description: Server updated
        content:
          application/json:
            schema:
              $ref: '../schemas/SuccessResponse.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '404':
        description: Server not found
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
