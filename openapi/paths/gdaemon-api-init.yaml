/gdaemon_api/get_token:
  get:
    tags:
      - DaemonAPI
    summary: Get daemon token
    description: Returns daemon API token
    operationId: getDaemonToken
    security:
      - daemonToken: []
    responses:
      '200':
        description: Token info
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: API token
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

/gdaemon_api/dedicated_servers/get_init_data/{node}:
  get:
    tags:
      - DaemonAPI
    summary: Get daemon init data
    description: Returns initialization data for daemon
    operationId: getDaemonInitData
    security:
      - daemonToken: []
    parameters:
      - name: node
        in: path
        required: true
        description: Node ID
        schema:
          type: integer
    responses:
      '200':
        description: Init data
        content:
          application/json:
            schema:
              type: object
              properties:
                dedicated_server:
                  $ref: '../schemas/Node.yaml'
                scripts:
                  type: object
                  additionalProperties:
                    type: string
                  description: Custom scripts
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '404':
        description: Node not found
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
