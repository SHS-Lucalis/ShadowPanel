/api/nodes/setup:
  get:
    tags:
      - Nodes
    summary: Get node setup data
    description: |
      Returns setup data for adding a new node (Admin only).
      When gRPC is enabled, returns enrollment commands and connect URL.
      When gRPC is disabled, only the legacy `link` + `token` fields are
      meaningful.
    operationId: getNodesSetup
    responses:
      '200':
        description: Setup data
        content:
          application/json:
