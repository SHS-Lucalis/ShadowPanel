type: object
description: Create user request
properties:
  login:
    type: string
    description: Username
    maxLength: 255
    example: "newuser"
  email:
    type: string
    format: email
    description: Email address
    maxLength: 255
    example: "user@example.com"
  password:
    type: string
    description: Password
    minLength: 6
    example: "secret123"
  name:
    type:
      - string
      - "null"
    description: Display name
    maxLength: 255
    example: "John Doe"
  roles:
    type: array
    description: User roles
    items:
      type: string
    example: ["user"]
required:
  - login
  - email
  - password
