type: object
description: Plugin update response
properties:
  id:
    type: integer
    description: Plugin ID
    example: 1
  name:
    type: string
    description: Plugin name
    example: "Auto Restart"
  version:
    type: string
    description: Updated version
    example: "1.3.0"
  status:
    type: string
    description: Plugin status
    example: "active"
  updated_at:
    type: string
    format: date-time
    description: Update timestamp
required:
  - id
  - name
  - version
  - status
  - updated_at
