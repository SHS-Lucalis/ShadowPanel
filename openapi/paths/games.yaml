    description: Updates a game (Admin only)
    operationId: updateGame
    parameters:
      - $ref: '../parameters/PathGameCode.yaml'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/requests/UpdateGameRequest.yaml'
    responses:
      '200':
        description: Game updated
        content:
          application/json:
            schema:
              $ref: '../schemas/Game.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '404':
        description: Game not found
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '422':
        description: Validation error
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

  delete:
    tags:
      - Games
    summary: Delete game
    description: Deletes a game (Admin only)
    operationId: deleteGame
    parameters:
      - $ref: '../parameters/PathGameCode.yaml'
    responses:
      '200':
        description: Game deleted
        content:
          application/json:
            schema:
              $ref: '../schemas/SuccessResponse.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '404':
        description: Game not found
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

/api/games/{code}/export:
  get:
    tags:
      - Games
    summary: Export game
    description: |
      Exports a game and all its mods to GameAP YAML format.

      The exported YAML file contains:
      - schema_version: "1.0"
      - exported_at: timestamp of export
      - exported_by: GameAP version
      - game: game configuration
      - mods: all mods for the game
    operationId: exportGame
    parameters:
      - $ref: '../parameters/PathGameCode.yaml'
    responses:
      '200':
        description: Game exported as YAML
        content:
          application/x-yaml:
            schema:
              type: string
              format: binary
        headers:
          Content-Disposition:
            description: Filename for download
            schema:
              type: string
              example: 'attachment; filename="cstrike.gameap.yaml"'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '404':
        description: Game not found
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

/api/games/{code}/mods:
  get:
