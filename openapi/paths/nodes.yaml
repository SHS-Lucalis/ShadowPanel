/api/nodes:
  get:
    tags:
      - Nodes
    summary: List nodes
    description: |
      Returns a flat array of nodes with abbreviated fields (Admin only).
      The handler does not implement pagination; daemon credentials and
      script overrides are intentionally omitted from list items.
      Use `GET /api/nodes/{id}` for the full Node payload.
    operationId: listNodes
    responses:
      '200':
        description: List of nodes
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/NodeListItem.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

/api/dedicated_servers:
  get:
    tags:
