# gremlins configuration for informational mutation testing.
# https://gremlins.dev/latest/configuration/

unleash:
  threshold-efficacy: 0
  threshold-mcover: 0
  workers: 4
  exclude-files:
    - "_mock\\.go$"
    - "_test\\.go$"
    - "/mocks/"
    - "^internal/gen/"
    - "^pkg/proto/"
    - "^pkg/plugin/proto/"
    - "^pkg/plugin/sdk/"
    - "^pkg/plugin/examples/"
    - "^migrations/"
    - "^test/"
    - "^pkg/testcontainer/"
