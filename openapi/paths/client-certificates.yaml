/api/client_certificates:
  get:
    tags:
      - ClientCertificates
    summary: List client certificates
    description: Returns a list of client certificates (Admin only)
    operationId: listClientCertificates
    responses:
      '200':
        description: List of certificates
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/ClientCertificate.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

  post:
    tags:
      - ClientCertificates
    summary: Create client certificate
    description: |
      Uploads a client certificate and matching private key (Admin only).
      Send as `multipart/form-data` with fields: `certificate` (PEM cert),
      `private_key` (PEM key), `private_key_pass` (optional). Body limit 10 MiB.
    operationId: createClientCertificate
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            required:
              - certificate
              - private_key
            properties:
              certificate:
                type: string
                format: binary
                description: PEM-encoded certificate file
              private_key:
                type: string
                format: binary
                description: PEM-encoded private key file
              private_key_pass:
                type: string
                description: Optional private key passphrase
    responses:
      '201':
        description: Certificate created
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                  description: ID of the newly created certificate
                  example: 1
              required:
                - id
      '400':
        description: Validation or PEM parsing error
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

/api/client_certificates/{id}:
  delete:
    tags:
      - ClientCertificates
    summary: Delete client certificate
    description: Deletes a client certificate (Admin only)
    operationId: deleteClientCertificate
    parameters:
      - $ref: '../parameters/PathCertificateId.yaml'
    responses:
      '204':
        description: Certificate deleted (no content)
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '404':
        description: Certificate not found
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
