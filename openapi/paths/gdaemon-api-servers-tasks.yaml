/gdaemon_api/servers_tasks:
  get:
    tags:
      - DaemonAPI
    summary: Get server tasks for daemon
    description: Returns pending server tasks for the daemon
    operationId: getDaemonServerTasks
    security:
      - daemonToken: []
    responses:
      '200':
        description: List of server tasks
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/ServerTask.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

/gdaemon_api/servers_tasks/{server_task}:
  get:
    tags:
      - DaemonAPI
    summary: Get server task
    description: Returns a specific server task
    operationId: getDaemonServerTask
    security:
      - daemonToken: []
    parameters:
      - name: server_task
        in: path
        required: true
        description: Server task ID
        schema:
          type: integer
    responses:
      '200':
        description: Server task details
        content:
          application/json:
            schema:
              $ref: '../schemas/ServerTask.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '404':
        description: Task not found
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

  put:
    tags:
      - DaemonAPI
    summary: Update server task
    description: Updates server task (increment counter, update execute_date)
    operationId: updateDaemonServerTask
    security:
      - daemonToken: []
    parameters:
      - name: server_task
        in: path
        required: true
        description: Server task ID
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              counter:
                type: integer
                description: Updated counter
              execute_date:
                type: string
                format: date-time
                description: Next execution date
    responses:
      '200':
        description: Task updated
        content:
          application/json:
            schema:
              $ref: '../schemas/SuccessResponse.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '404':
        description: Task not found
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'

/gdaemon_api/servers_tasks/{server_task}/fail:
  post:
    tags:
      - DaemonAPI
    summary: Report server task failure
    description: Reports a server task execution failure
    operationId: reportServerTaskFailure
    security:
      - daemonToken: []
    parameters:
      - name: server_task
        in: path
        required: true
        description: Server task ID
        schema:
          type: integer
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              output:
                type: string
                description: Failure output/error message
            required:
              - output
    responses:
      '200':
        description: Failure recorded
        content:
          application/json:
            schema:
              $ref: '../schemas/SuccessResponse.yaml'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
      '404':
        description: Task not found
        content:
          application/json:
            schema:
              $ref: '../schemas/ErrorResponse.yaml'
