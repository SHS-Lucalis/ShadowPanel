type: object
description: Update profile request
properties:
  name:
    type:
      - string
      - "null"
    description: Display name
    maxLength: 255
    example: "John Doe"
  current_password:
    type: string
    description: Current password (required if changing password)
  password:
    type: string
    description: New password (min 8 characters; sending it requires current_password)
    minLength: 8
    maxLength: 64
